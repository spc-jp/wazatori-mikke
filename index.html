<!DOCTYPE html>
<html lang="ja" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>技採みっけ</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Google Fonts (Noto Sans JP) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class', // ダークモードを有効化
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans JP"', 'sans-serif'],
                    },
                    colors: {
                        ios: {
                            bg: '#F8F9FB',
                            card: '#FFFFFF',
                            text: '#1C1C1E',
                        },
                        brand: {
                            main: '#1a2e4a', /* ネイビー */
                            light: '#c0c8d0' /* シルバー */
                        }
                    },
                    boxShadow: {
                        'premium': '0 10px 30px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,1)',
                        'floating': '0 20px 40px -10px rgba(26, 46, 74, 0.3)',
                    }
                }
            }
        }
    </script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .hidden-view { display: none !important; }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: slideUpFade 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        
        .active-scale { transition: transform 0.15s cubic-bezier(0.2, 0.8, 0.2, 1); cursor: pointer; }
        .active-scale:active { transform: scale(0.96); }

        .glass-header {
            background-color: rgba(248, 249, 251, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        /* ダークモード時のヘッダー */
        html.dark .glass-header {
            background-color: rgba(31, 41, 55, 0.85);
        }

        .bg-orb-1 {
            position: absolute; top: -5%; left: -20%; width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(26,46,74,0.1) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%; z-index: 0; pointer-events: none;
        }
        .bg-orb-2 {
            position: absolute; top: 30%; right: -20%; width: 250px; height: 250px;
            background: radial-gradient(circle, rgba(192,200,208,0.3) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%; z-index: 0; pointer-events: none;
        }
        /* ダークモード時のオーブ */
        html.dark .bg-orb-1 { background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, rgba(255,255,255,0) 70%); }
        html.dark .bg-orb-2 { background: radial-gradient(circle, rgba(156,163,175,0.1) 0%, rgba(255,255,255,0) 70%); }
    </style>
</head>
<body class="bg-gray-200 dark:bg-gray-900 min-h-screen flex items-center justify-center font-sans m-0 md:p-6 text-ios-text dark:text-gray-100 transition-colors duration-300">

    <div class="w-full h-screen md:h-[844px] max-w-[390px] bg-ios-bg dark:bg-gray-900 md:rounded-[3rem] md:shadow-[0_20px_60px_-15px_rgba(0,0,0,0.4)] overflow-x-hidden overflow-y-auto flex flex-col relative md:border-[8px] border-gray-900 ring-1 ring-gray-200 transition-colors duration-300">
        
        <div class="bg-orb-1"></div>
        <div class="bg-orb-2"></div>

        <!-- ヘッダー -->
        <header class="glass-header px-5 py-4 flex items-center justify-between sticky top-0 z-30 border-b border-white/50 dark:border-gray-700/50">
            <div class="flex items-center">
                <div class="w-9 h-9 bg-brand-main rounded-xl flex items-center justify-center mr-3 shadow-sm text-white relative overflow-hidden">
                    <div class="absolute inset-0 bg-white/20 transform -skew-x-12 translate-x-full"></div>
                    <i class="ph-fill ph-factory text-xl"></i>
                </div>
                <h1 class="font-extrabold text-[17px] tracking-tight text-gray-900 dark:text-white">技採みっけ</h1>
            </div>
            <!-- 設定ボタン -->
            <button onclick="openSettings()" class="active-scale w-8 h-8 bg-white dark:bg-gray-800 rounded-full flex items-center justify-center shadow-inner border border-gray-100 dark:border-gray-700 relative overflow-hidden text-gray-400 dark:text-gray-300 hover:text-gray-600 dark:hover:text-white">
                <i class="ph-bold ph-gear text-[18px]"></i>
            </button>
        </header>

        <!-- メイン画面 -->
        <main class="flex-1 relative z-10 pb-12" id="main-content">
            
            <!-- 挨拶メッセージエリア -->
            <div class="px-5 pt-5 pb-1 relative z-10 fade-in">
                <p id="greeting-message" class="text-[13px] font-bold text-gray-600 dark:text-gray-300 tracking-wide flex items-start gap-2 leading-relaxed bg-white/60 dark:bg-gray-800/60 backdrop-blur-md p-3.5 rounded-[1rem] border border-white dark:border-gray-700 shadow-sm"></p>
            </div>

            <!-- タブナビゲーション -->
            <div class="p-4 relative z-10 pt-2">
                <div class="flex bg-gray-200/70 dark:bg-gray-800 p-1.5 rounded-[1.2rem] backdrop-blur-sm shadow-inner">
                    <button id="tab-strength" class="active-scale flex-1 py-3 text-[14px] font-extrabold flex items-center justify-center rounded-xl transition-all relative text-gray-900 dark:text-gray-100">
                        <span class="relative z-10 flex items-center gap-1.5"><i class="ph-bold ph-factory text-lg"></i>強み発信</span>
                        <div id="tab-bg-strength" class="absolute inset-0 bg-white dark:bg-gray-700 rounded-xl shadow-sm z-0"></div>
                    </button>
                    <button id="tab-recruit" class="active-scale flex-1 py-3 text-[14px] font-extrabold flex items-center justify-center rounded-xl transition-all relative text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200">
                        <span class="relative z-10 flex items-center gap-1.5"><i class="ph-bold ph-users text-lg"></i>採用発信</span>
                        <div id="tab-bg-recruit" class="absolute inset-0 bg-white dark:bg-gray-700 rounded-xl shadow-sm z-0 hidden-view"></div>
                    </button>
                </div>
            </div>

            <div class="px-5">
                <!-- 【タブ1】 強み発信フォーム -->
                <div id="form-strength" class="fade-in space-y-7">
                    
                    <!-- 1. 写真 -->
                    <div>
                        <h2 class="text-[13px] font-extrabold text-gray-500 dark:text-gray-400 mb-2.5 tracking-wider flex items-center gap-1.5">
                            <span class="bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 w-5 h-5 rounded-full flex items-center justify-center text-[11px]">1</span>
                            写真
                        </h2>
                        <label class="block active-scale">
                            <input type="file" accept="image/*" class="hidden" onchange="handlePhotoSelect(this, 'strength-photo-label')">
                            <div id="strength-photo-label" class="border-2 border-dashed border-gray-300 dark:border-gray-600 bg-white/50 dark:bg-gray-800/50 rounded-[1.2rem] py-5 text-center flex flex-col items-center justify-center shadow-sm">
                                <i class="ph-fill ph-camera text-3xl text-gray-400 dark:text-gray-500 mb-2"></i>
                                <span class="text-[14px] font-bold text-gray-600 dark:text-gray-300">現場の写真を撮る・選ぶ</span>
                            </div>
                        </label>
                        <p class="text-[11px] font-bold text-gray-400 dark:text-gray-500 mt-2 text-center">※選んだ写真は、コピー後に各SNSアプリで添付してください</p>
                    </div>

                    <!-- 2. 発信選択 (SNS) -->
                    <div>
                        <h2 class="text-[13px] font-extrabold text-gray-500 dark:text-gray-400 mb-2.5 tracking-wider flex items-center gap-1.5">
                            <span class="bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 w-5 h-5 rounded-full flex items-center justify-center text-[11px]">2</span>
                            発信先（SNS）
                        </h2>
                        <div class="flex bg-gray-200/50 dark:bg-gray-800 p-1.5 rounded-[1.2rem] shadow-inner">
                            <label class="flex-1 cursor-pointer active-scale relative text-center">
                                <input type="radio" name="strength-sns" value="x" class="hidden peer">
                                <div class="py-3 text-[13px] font-bold rounded-xl text-gray-500 dark:text-gray-400 transition-all peer-checked:text-gray-900 dark:peer-checked:text-white peer-checked:bg-white dark:peer-checked:bg-gray-700 peer-checked:shadow-sm flex items-center justify-center gap-1.5">
                                    <i class="ph-fill ph-twitter-logo text-xl text-black dark:text-white"></i> X
                                </div>
                            </label>
                            <label class="flex-1 cursor-pointer active-scale relative text-center">
                                <input type="radio" name="strength-sns" value="instagram" class="hidden peer">
                                <div class="py-3 text-[13px] font-bold rounded-xl text-gray-500 dark:text-gray-400 transition-all peer-checked:text-gray-900 dark:peer-checked:text-white peer-checked:bg-white dark:peer-checked:bg-gray-700 peer-checked:shadow-sm flex items-center justify-center gap-1.5">
                                    <i class="ph-fill ph-instagram-logo text-xl text-pink-500"></i> IG
                                </div>
                            </label>
                            <label class="flex-1 cursor-pointer active-scale relative text-center">
                                <input type="radio" name="strength-sns" value="facebook" class="hidden peer">
                                <div class="py-3 text-[13px] font-bold rounded-xl text-gray-500 dark:text-gray-400 transition-all peer-checked:text-gray-900 dark:peer-checked:text-white peer-checked:bg-white dark:peer-checked:bg-gray-700 peer-checked:shadow-sm flex items-center justify-center gap-1.5">
                                    <i class="ph-fill ph-facebook-logo text-xl text-blue-600 dark:text-blue-400"></i> FB
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- 3. 今日の素材 -->
                    <div>
                        <h2 class="text-[13px] font-extrabold text-gray-500 dark:text-gray-400 mb-2.5 tracking-wider flex items-center gap-1.5">
                            <span class="bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 w-5 h-5 rounded-full flex items-center justify-center text-[11px]">3</span>
                            今日の素材・作業
                        </h2>
                        <input type="text" id="strength-input1" placeholder="例：PPS部品の仕上げ" class="w-full bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-[1.2rem] px-4 py-3.5 text-[15px] font-bold text-gray-800 dark:text-gray-100 focus:outline-none focus:border-brand-main focus:ring-2 focus:ring-brand-main/20 transition-all shadow-sm">
                    </div>

                    <!-- 4. アピール -->
                    <div>
                        <h2 class="text-[13px] font-extrabold text-gray-500 dark:text-gray-400 mb-2.5 tracking-wider flex items-center gap-1.5">
                            <span class="bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 w-5 h-5 rounded-full flex items-center justify-center text-[11px]">4</span>
                            アピールしたい特徴（複数可）
                        </h2>
                        <div class="grid grid-cols-2 gap-2.5">
                            <label class="cursor-pointer block active-scale">
                                <input type="checkbox" value="耐熱性" class="hidden peer strength-feature">
                                <div class="border border-gray-100 dark:border-gray-700 bg-white dark:bg-gray-800 rounded-[1.2rem] py-3.5 px-2 text-center transition-all text-[13px] font-bold text-gray-500 dark:text-gray-400 shadow-sm flex flex-col items-center justify-center gap-1.5 peer-checked:bg-brand-main peer-checked:text-white peer-checked:border-brand-main peer-checked:shadow-floating">
                                    <i class="ph-bold ph-thermometer text-2xl"></i>耐熱性
                                </div>
                            </label>
                            <label class="cursor-pointer block active-scale">
                                <input type="checkbox" value="精密加工" class="hidden peer strength-feature">
                                <div class="border border-gray-100 dark:border-gray-700 bg-white dark:bg-gray-800 rounded-[1.2rem] py-3.5 px-2 text-center transition-all text-[13px] font-bold text-gray-500 dark:text-gray-400 shadow-sm flex flex-col items-center justify-center gap-1.5 peer-checked:bg-brand-main peer-checked:text-white peer-checked:border-brand-main peer-checked:shadow-floating">
                                    <i class="ph-bold ph-crosshair text-2xl"></i>精密加工
                                </div>
                            </label>
                            <label class="cursor-pointer block active-scale">
                                <input type="checkbox" value="小ロット対応" class="hidden peer strength-feature">
                                <div class="border border-gray-100 dark:border-gray-700 bg-white dark:bg-gray-800 rounded-[1.2rem] py-3.5 px-2 text-center transition-all text-[13px] font-bold text-gray-500 dark:text-gray-400 shadow-sm flex flex-col items-center justify-center gap-1.5 peer-checked:bg-brand-main peer-checked:text-white peer-checked:border-brand-main peer-checked:shadow-floating">
                                    <i class="ph-bold ph-package text-2xl"></i>小ロット対応
                                </div>
                            </label>
                            <label class="cursor-pointer block active-scale">
                                <input type="checkbox" value="耐薬品性" class="hidden peer strength-feature">
                                <div class="border border-gray-100 dark:border-gray-700 bg-white dark:bg-gray-800 rounded-[1.2rem] py-3.5 px-2 text-center transition-all text-[13px] font-bold text-gray-500 dark:text-gray-400 shadow-sm flex flex-col items-center justify-center gap-1.5 peer-checked:bg-brand-main peer-checked:text-white peer-checked:border-brand-main peer-checked:shadow-floating">
                                    <i class="ph-bold ph-flask text-2xl"></i>耐薬品性
                                </div>
                            </label>
                            <label class="cursor-pointer block active-scale col-span-2">
                                <input type="checkbox" value="高強度" class="hidden peer strength-feature">
                                <div class="border border-gray-100 dark:border-gray-700 bg-white dark:bg-gray-800 rounded-[1.2rem] py-3.5 px-2 text-center transition-all text-[13px] font-bold text-gray-500 dark:text-gray-400 shadow-sm flex flex-col items-center justify-center gap-1.5 peer-checked:bg-brand-main peer-checked:text-white peer-checked:border-brand-main peer-checked:shadow-floating">
                                    <i class="ph-bold ph-shield-check text-2xl"></i>高強度
                                </div>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- 【タブ2】 採用発信フォーム -->
                <div id="form-recruit" class="fade-in space-y-7 hidden-view">
                    
                    <!-- 1. 写真 -->
                    <div>
                        <h2 class="text-[13px] font-extrabold text-gray-500 dark:text-gray-400 mb-2.5 tracking-wider flex items-center gap-1.5">
                            <span class="bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 w-5 h-5 rounded-full flex items-center justify-center text-[11px]">1</span>
                            写真
                        </h2>
                        <label class="block active-scale">
                            <input type="file" accept="image/*" class="hidden" onchange="handlePhotoSelect(this, 'recruit-photo-label')">
                            <div id="recruit-photo-label" class="border-2 border-dashed border-gray-300 dark:border-gray-600 bg-white/50 dark:bg-gray-800/50 rounded-[1.2rem] py-5 text-center flex flex-col items-center justify-center shadow-sm">
                                <i class="ph-fill ph-camera text-3xl text-gray-400 dark:text-gray-500 mb-2"></i>
                                <span class="text-[14px] font-bold text-gray-600 dark:text-gray-300">現場の写真を撮る・選ぶ</span>
                            </div>
                        </label>
                        <p class="text-[11px] font-bold text-gray-400 dark:text-gray-500 mt-2 text-center">※選んだ写真は、コピー後に各SNSアプリで添付してください</p>
                    </div>

                    <!-- 2. 発信選択 -->
                    <div>
                        <h2 class="text-[13px] font-extrabold text-gray-500 dark:text-gray-400 mb-2.5 tracking-wider flex items-center gap-1.5">
                            <span class="bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 w-5 h-5 rounded-full flex items-center justify-center text-[11px]">2</span>
                            発信先（SNS）
                        </h2>
                        <div class="flex bg-gray-200/50 dark:bg-gray-800 p-1.5 rounded-[1.2rem] shadow-inner">
                            <label class="flex-1 cursor-pointer active-scale relative text-center">
                                <input type="radio" name="recruit-sns" value="x" class="hidden peer">
                                <div class="py-3 text-[13px] font-bold rounded-xl text-gray-500 dark:text-gray-400 transition-all peer-checked:text-gray-900 dark:peer-checked:text-white peer-checked:bg-white dark:peer-checked:bg-gray-700 peer-checked:shadow-sm flex items-center justify-center gap-1.5">
                                    <i class="ph-fill ph-twitter-logo text-xl text-black dark:text-white"></i> X
                                </div>
                            </label>
                            <label class="flex-1 cursor-pointer active-scale relative text-center">
                                <input type="radio" name="recruit-sns" value="instagram" class="hidden peer">
                                <div class="py-3 text-[13px] font-bold rounded-xl text-gray-500 dark:text-gray-400 transition-all peer-checked:text-gray-900 dark:peer-checked:text-white peer-checked:bg-white dark:peer-checked:bg-gray-700 peer-checked:shadow-sm flex items-center justify-center gap-1.5">
                                    <i class="ph-fill ph-instagram-logo text-xl text-pink-500"></i> IG
                                </div>
                            </label>
                            <label class="flex-1 cursor-pointer active-scale relative text-center">
                                <input type="radio" name="recruit-sns" value="facebook" class="hidden peer">
                                <div class="py-3 text-[13px] font-bold rounded-xl text-gray-500 dark:text-gray-400 transition-all peer-checked:text-gray-900 dark:peer-checked:text-white peer-checked:bg-white dark:peer-checked:bg-gray-700 peer-checked:shadow-sm flex items-center justify-center gap-1.5">
                                    <i class="ph-fill ph-facebook-logo text-xl text-blue-600 dark:text-blue-400"></i> FB
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- 3. 今日の素材 (仕事内容) -->
                    <div>
                        <div class="flex flex-col mb-2.5 gap-2">
                            <div class="flex items-center justify-between">
                                <h2 class="text-[13px] font-extrabold text-gray-500 dark:text-gray-400 tracking-wider flex items-center gap-1.5">
                                    <span class="bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 w-5 h-5 rounded-full flex items-center justify-center text-[11px]">3</span>
                                    募集する仕事内容
                                </h2>
                                <!-- テンプレート選択プルダウン -->
                                <div class="relative active-scale">
                                    <select onchange="document.getElementById('recruit-input1').value = this.value; this.selectedIndex = 0;" class="appearance-none bg-brand-main text-white text-[11px] font-bold py-1.5 pl-3 pr-6 rounded-full focus:outline-none shadow-sm cursor-pointer">
                                        <option value="" disabled selected>▼ リストから選ぶ</option>
                                        <option value="成形機オペレーター">成形機オペレーター</option>
                                        <option value="金型のメンテナンス・段取り">金型のメンテナンス・段取り</option>
                                        <option value="製品の検査・仕上げ">製品の検査・仕上げ</option>
                                    </select>
                                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-2 text-white">
                                        <i class="ph-bold ph-caret-down text-[10px]"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <input type="text" id="recruit-input1" placeholder="例：成形機オペレーター（自由に修正できます）" class="w-full bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-[1.2rem] px-4 py-3.5 text-[15px] font-bold text-gray-800 dark:text-gray-100 focus:outline-none focus:border-brand-main focus:ring-2 focus:ring-brand-main/20 transition-all shadow-sm">
                    </div>

                    <!-- 4. アピール -->
                    <div>
                        <h2 class="text-[13px] font-extrabold text-gray-500 dark:text-gray-400 mb-2.5 tracking-wider flex items-center gap-1.5">
                            <span class="bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 w-5 h-5 rounded-full flex items-center justify-center text-[11px]">4</span>
                            こんな人に来てほしい（複数可）
                        </h2>
                        <div class="grid grid-cols-2 gap-2.5">
                            <label class="cursor-pointer block active-scale">
                                <input type="checkbox" value="手を動かすのが好き" class="hidden peer recruit-feature">
                                <div class="border border-gray-100 dark:border-gray-700 bg-white dark:bg-gray-800 rounded-[1.2rem] py-3.5 px-2 text-center transition-all text-[12px] font-bold text-gray-500 dark:text-gray-400 shadow-sm flex flex-col items-center justify-center gap-1.5 peer-checked:bg-brand-main peer-checked:text-white peer-checked:border-brand-main peer-checked:shadow-floating">
                                    <i class="ph-bold ph-hand-palm text-2xl"></i>手を動かすのが好き
                                </div>
                            </label>
                            <label class="cursor-pointer block active-scale">
                                <input type="checkbox" value="ものづくりが好き" class="hidden peer recruit-feature">
                                <div class="border border-gray-100 dark:border-gray-700 bg-white dark:bg-gray-800 rounded-[1.2rem] py-3.5 px-2 text-center transition-all text-[12px] font-bold text-gray-500 dark:text-gray-400 shadow-sm flex flex-col items-center justify-center gap-1.5 peer-checked:bg-brand-main peer-checked:text-white peer-checked:border-brand-main peer-checked:shadow-floating">
                                    <i class="ph-bold ph-wrench text-2xl"></i>ものづくりが好き
                                </div>
                            </label>
                            <label class="cursor-pointer block active-scale">
                                <input type="checkbox" value="丁寧な仕事をしたい" class="hidden peer recruit-feature">
                                <div class="border border-gray-100 dark:border-gray-700 bg-white dark:bg-gray-800 rounded-[1.2rem] py-3.5 px-2 text-center transition-all text-[12px] font-bold text-gray-500 dark:text-gray-400 shadow-sm flex flex-col items-center justify-center gap-1.5 peer-checked:bg-brand-main peer-checked:text-white peer-checked:border-brand-main peer-checked:shadow-floating">
                                    <i class="ph-bold ph-magnifying-glass text-2xl"></i>丁寧な仕事をしたい
                                </div>
                            </label>
                            <label class="cursor-pointer block active-scale">
                                <input type="checkbox" value="未経験でも挑戦したい" class="hidden peer recruit-feature">
                                <div class="border border-gray-100 dark:border-gray-700 bg-white dark:bg-gray-800 rounded-[1.2rem] py-3.5 px-2 text-center transition-all text-[12px] font-bold text-gray-500 dark:text-gray-400 shadow-sm flex flex-col items-center justify-center gap-1.5 peer-checked:bg-brand-main peer-checked:text-white peer-checked:border-brand-main peer-checked:shadow-floating">
                                    <i class="ph-bold ph-star text-2xl"></i>未経験でも挑戦したい
                                </div>
                            </label>
                            <label class="cursor-pointer block active-scale col-span-2">
                                <input type="checkbox" value="手に職をつけたい" class="hidden peer recruit-feature">

                const activeEmail = appSettings.email || 'k_morita@moritaseisakusyo.co.jp';
                const contactText = `\n\n▼詳細・お問い合わせはこちら\n🌐 ${activeUrl}\n✉️ ${activeEmail}\n\n`;

                selectedTemplate = selectedTemplate.replaceAll('{ハッシュタグ}', contactText + hashtags.join(' '));
                
                // 結果表示
                const resultText = document.getElementById('result-text');
                resultText.value = selectedTemplate;
                resultArea.classList.remove('hidden-view');
                
                setTimeout(() => {
                    resultArea.scrollIntoView({ behavior: 'smooth', block: 'end' });
                }, 100);
            });

            // コピーボタンの処理
            document.getElementById('copy-btn').addEventListener('click', () => {
                const textarea = document.getElementById('result-text');
                
                textarea.select();
                textarea.setSelectionRange(0, 99999); 
                document.execCommand('copy');
                window.getSelection().removeAllRanges();
                
                const copyBtn = document.getElementById('copy-btn');
                const copyText = document.getElementById('copy-text');
                const copyIcon = document.getElementById('copy-icon');
                
                copyBtn.classList.replace('from-brand-main', 'from-green-500');
                copyBtn.classList.replace('to-blue-900', 'to-emerald-600');
                copyText.textContent = 'コピーしました！';
                copyIcon.className = 'ph-bold ph-check text-xl mr-2 relative z-10';
                
                setTimeout(() => {
                    copyBtn.classList.replace('from-green-500', 'from-brand-main');
                    copyBtn.classList.replace('to-emerald-600', 'to-blue-900');
                    copyText.textContent = 'テキストをコピーする';
                    copyIcon.className = 'ph-bold ph-copy text-xl mr-2 relative z-10';
                }, 2000);
            });

        });
    </script>
</body>
</html>
